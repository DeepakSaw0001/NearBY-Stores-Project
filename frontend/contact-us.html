<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>contact - NearBY Stores</title>
  <style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f6f8;
}

.contact{
max-width:1000px;
margin:50px auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.contact h2{
text-align:center;
margin-bottom:10px;
}

.contact p{
text-align:center;
margin-bottom:30px;
color:#555;
}

.contact-container{
display:flex;
gap:40px;
flex-wrap:wrap;
}

.contact-info{
flex:1;
}

.contact-info p{
text-align:left;
margin:10px 0;
}

.contact-form{
flex:1;
display:flex;
flex-direction:column;
}

.contact-form input,
.contact-form textarea{
padding:10px;
margin-bottom:15px;
border-radius:5px;
border:1px solid #ccc;
}

.contact-form button{
padding:12px;
background:#4040ff;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

.contact-form button:hover{
background:#2d2dff;
}
  </style>
  
</head>
<body>
  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>
<link rel="stylesheet" href="contact.css">
</head>

<body>

<section class="contact">

<h2>Contact Us</h2>
<p>Have questions or suggestions? We'd love to hear from you.</p>

<div class="contact-container">

<div class="contact-info">
<h3>Our Information</h3>
<p><strong>Email:</strong> support@nearbystores.com</p>
<p><strong>Phone:</strong> +91 9876543210</p>
<p><strong>Address:</strong> Mumbai, Maharashtra, India</p>
</div>

<form class="contact-form">

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Your Email" required>

<textarea placeholder="Your Message" rows="5"></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</section>

</body>
</html>
</body>
</html>
